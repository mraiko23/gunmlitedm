<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat API</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root {
      --primary: #646cff;
      --bg: #0f0f0f;
      --sidebar-bg: #1a1a1a;
      --message-user: #2a2a2a;
      --message-ai: #1e1e1e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    .app {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header h2 {
      margin: 0;
      font-size: 1.2rem;
    }
    .new-chat-btn {
      background: var(--primary);
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .new-chat-btn:hover { opacity: 0.9; }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    .chat-item {
      padding: 0.8rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    .chat-item:hover { background: #2a2a2a; }
    .chat-item.active { background: #333; }
    .chat-item-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .chat-item-delete {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .chat-item:hover .chat-item-delete { opacity: 1; }
    .chat-item-delete:hover { color: #ff4444; }
    
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      padding: 1rem;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1a1a;
    }
    .model-select {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #e0e0e0;
      padding: 0.5rem;
      border-radius: 6px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .message {
      max-width: 800px;
      margin: 0 auto 1rem;
      padding: 1rem;
      border-radius: 12px;
      line-height: 1.6;
    }
    .message.user {
      background: var(--message-user);
      margin-left: 2rem;
    }
    .message.assistant {
      background: var(--message-ai);
      margin-right: 2rem;
    }
    .message-role {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.5rem;
    }
    .message-content {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .message-content img {
      max-width: 300px;
      border-radius: 8px;
      margin-top: 0.5rem;
    }
    .attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .attachment-preview {
      position: relative;
    }
    .attachment-preview img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }
    .attachment-preview .remove {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .input-area {
      padding: 1rem;
      border-top: 1px solid #333;
      background: #1a1a1a;
    }
    .input-container {
      max-width: 800px;
      margin: 0 auto;
    }
    .input-wrapper {
      display: flex;
      gap: 0.5rem;
      background: #2a2a2a;
      border-radius: 12px;
      padding: 0.5rem;
    }
    .input-wrapper textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: #e0e0e0;
      resize: none;
      padding: 0.5rem;
      font-size: 1rem;
      min-height: 24px;
      max-height: 200px;
    }
    .input-wrapper textarea:focus {
      outline: none;
    }
    .input-actions {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    .attach-btn, .send-btn {
      background: none;
      border: none;
      padding: 0.5rem;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .attach-btn:hover { background: #333; }
    .attach-btn svg, .send-btn svg {
      width: 24px;
      height: 24px;
      fill: #888;
    }
    .send-btn {
      background: var(--primary);
    }
    .send-btn svg { fill: white; }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled {
      background: #333;
      cursor: not-allowed;
    }
    .send-btn:disabled svg { fill: #666; }
    
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
    }
    .empty-state svg {
      width: 64px;
      height: 64px;
      fill: #444;
      margin-bottom: 1rem;
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #333;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #ff4444;
      color: white;
      padding: 1rem 2rem;
      border-radius: 8px;
      animation: slideUp 0.3s;
    }
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(100%); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    
    .hidden { display: none; }
    
    pre {
      background: #1a1a1a;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
    }
    code {
      background: #1a1a1a;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>💬 Chats</h2>
        <button class="new-chat-btn" onclick="createChat()">+ New</button>
      </div>
      <div class="chat-list" id="chatList"></div>
    </aside>
    
    <main class="main">
      <div class="chat-header">
        <h3 id="chatTitle">Select a chat</h3>
        <select class="model-select" id="modelSelect">
          <option value="glm-4">GLM-4</option>
          <option value="llama-3.1-70b">Llama 3.1 70B</option>
          <option value="mixtral-8x7b">Mixtral 8x7B</option>
          <option value="gpt-4o-mini">GPT-4o Mini</option>
          <option value="gemini-pro">Gemini Pro</option>
        </select>
      </div>
      
      <div class="messages" id="messagesContainer">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
          <p>Select a chat or create a new one</p>
        </div>
      </div>
      
      <div class="input-area">
        <div class="input-container">
          <div class="attachments" id="attachmentsPreview"></div>
          <div class="input-wrapper">
            <textarea 
              id="messageInput" 
              placeholder="Type a message..." 
              rows="1"
              onkeydown="handleKeydown(event)"
              oninput="autoResize(this)"
            ></textarea>
            <div class="input-actions">
              <button class="attach-btn" onclick="document.getElementById('fileInput').click()">
                <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
              </button>
              <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
              </button>
            </div>
          </div>
          <input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt,.doc,.docx" style="display:none" onchange="handleFiles(this.files)">
        </div>
      </div>
    </main>
  </div>
  
  <div id="errorToast" class="error-toast hidden"></div>
  
  <script>
    const API = '/api';
    let currentChat = null;
    let attachments = [];
    
    // Load chats on start
    loadChats();
    
    async function loadChats() {
      const res = await fetch(`${API}/chats`);
      const chats = await res.json();
      renderChatList(chats);
    }
    
    function renderChatList(chats) {
      const list = document.getElementById('chatList');
      list.innerHTML = chats.map(chat => `
        <div class="chat-item ${currentChat?.id === chat.id ? 'active' : ''}" onclick="selectChat('${chat.id}')">
          <span class="chat-item-title">${escapeHtml(chat.title)}</span>
          <button class="chat-item-delete" onclick="event.stopPropagation(); deleteChat('${chat.id}')">🗑</button>
        </div>
      `).join('');
    }
    
    async function createChat() {
      const res = await fetch(`${API}/chats`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      const chat = await res.json();
      currentChat = chat;
      loadChats();
      renderMessages([]);
      document.getElementById('chatTitle').textContent = chat.title;
      document.getElementById('emptyState').classList.add('hidden');
    }
    
    async function selectChat(id) {
      const res = await fetch(`${API}/chats/${id}`);
      const chat = await res.json();
      currentChat = chat;
      document.getElementById('chatTitle').textContent = chat.title;
      document.getElementById('emptyState').classList.add('hidden');
      renderMessages(chat.messages || []);
      loadChats();
    }
    
    async function deleteChat(id) {
      if (!confirm('Delete this chat?')) return;
      await fetch(`${API}/chats/${id}`, { method: 'DELETE' });
      if (currentChat?.id === id) {
        currentChat = null;
        document.getElementById('chatTitle').textContent = 'Select a chat';
        document.getElementById('emptyState').classList.remove('hidden');
        renderMessages([]);
      }
      loadChats();
    }
    
    function renderMessages(messages) {
      const container = document.getElementById('messagesContainer');
      container.innerHTML = messages.map(msg => `
        <div class="message ${msg.role}">
          <div class="message-role">${msg.role === 'user' ? '👤 You' : '🤖 AI'}</div>
          <div class="message-content">${formatContent(msg.content)}</div>
        </div>
      `).join('') || '<div class="empty-state" id="emptyState"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg><p>Start a conversation</p></div>';
      container.scrollTop = container.scrollHeight;
    }
    
    function formatContent(content) {
      // Basic markdown-like formatting
      return escapeHtml(content)
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }
    
    async function sendMessage() {
      if (!currentChat) {
        await createChat();
      }
      
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      if (!content && attachments.length === 0) return;
      
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      
      // Show user message immediately
      const messagesContainer = document.getElementById('messagesContainer');
      const emptyState = document.getElementById('emptyState');
      if (emptyState) emptyState.remove();
      
      messagesContainer.innerHTML += `
        <div class="message user">
          <div class="message-role">👤 You</div>
          <div class="message-content">${escapeHtml(content)}</div>
        </div>
        <div class="message assistant" id="loadingMessage">
          <div class="message-role">🤖 AI</div>
          <div class="message-content"><span class="loading"></span></div>
        </div>
      `;
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      
      input.value = '';
      autoResize(input);
      
      const formData = new FormData();
      formData.append('content', content);
      formData.append('model', document.getElementById('modelSelect').value);
      attachments.forEach((file, i) => {
        formData.append('files', file);
      });
      attachments = [];
      document.getElementById('attachmentsPreview').innerHTML = '';
      
      try {
        const res = await fetch(`${API}/chats/${currentChat.id}/messages`, {
          method: 'POST',
          body: formData
        });
        
        const data = await res.json();
        
        if (res.ok) {
          document.getElementById('loadingMessage').remove();
          messagesContainer.innerHTML += `
            <div class="message assistant">
              <div class="message-role">🤖 AI</div>
              <div class="message-content">${formatContent(data.assistantMessage.content)}</div>
            </div>
          `;
          messagesContainer.scrollTop = messagesContainer.scrollHeight;
          
          // Update title
          loadChats();
        } else {
          throw new Error(data.error);
        }
      } catch (err) {
        document.getElementById('loadingMessage')?.remove();
        showError(err.message);
      }
      
      sendBtn.disabled = false;
    }
    
    function handleKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }
    
    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
    }
    
    function handleFiles(files) {
      for (const file of files) {
        if (file.type.startsWith('image/')) {
          attachments.push(file);
          const reader = new FileReader();
          reader.onload = (e) => {
            const preview = document.createElement('div');
            preview.className = 'attachment-preview';
            preview.innerHTML = `
              <img src="${e.target.result}">
              <button class="remove" onclick="removeAttachment(${attachments.length - 1}, this)">×</button>
            `;
            document.getElementById('attachmentsPreview').appendChild(preview);
          };
          reader.readAsDataURL(file);
        }
      }
    }
    
    function removeAttachment(index, btn) {
      attachments.splice(index, 1);
      btn.parentElement.remove();
    }
    
    function showError(msg) {
      const toast = document.getElementById('errorToast');
      toast.textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 5000);
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
